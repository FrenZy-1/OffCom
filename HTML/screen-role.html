<div id="screenRole" class="screen">
	<div class="card">
		<div class="card-title">Choose Your Role</div>
		<div style="display: grid; gap: 1rem;">
			<button class="btn btn-secondary" onclick="selectRole('host')" style="text-align: left; padding: 1.5rem;">
				<div style="font-size: 2rem; margin-bottom: 0.5rem;">📡</div>
				<div style="font-weight: 700;">Create Room (Host)</div>
				<div style="font-size: 0.875rem; color: var(--text-dim);">Phone with hotspot</div>
			</button>
			<button class="btn btn-secondary" onclick="selectRole('guest')" style="text-align: left; padding: 1.5rem;">
				<div style="font-size: 2rem; margin-bottom: 0.5rem;">🔗</div>
				<div style="font-weight: 700;">Join Room (Guest)</div>
				<div style="font-size: 0.875rem; color: var(--text-dim);">Connect to hotspot</div>
			</button>
		</div>
	</div>
</div>
